name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: root
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported: Moodle 4.5 + PHP 8.1
          - moodle-branch: MOODLE_405_STABLE
            php: '8.1'
            database: pgsql
          - moodle-branch: MOODLE_405_STABLE
            php: '8.1'
            database: mariadb

          # Latest stable: Moodle 5.1 + PHP 8.3
          - moodle-branch: MOODLE_501_STABLE
            php: '8.3'
            database: pgsql
          - moodle-branch: MOODLE_501_STABLE
            php: '8.3'
            database: mariadb

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, zip, gd, intl, soap, pgsql, mysqli
          coverage: pcov
          ini-values: max_input_vars=5000

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci && pwd)/bin" >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Install runtime dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        working-directory: ${{ github.workspace }}/plugin

      - name: Install Moodle (${{ matrix.moodle-branch }}, ${{ matrix.database }})
        run: moodle-plugin-ci install --plugin ${{ github.workspace }}/plugin --db-type=${{ matrix.database }} --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd
        continue-on-error: true

      - name: Remove vendor before PHPCS
        run: rm -rf ${{ github.workspace }}/moodle/mod/quiz/accessrule/proview/vendor

      - name: PHP Code Sniffer
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Reinstall runtime dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        working-directory: ${{ github.workspace }}/moodle/mod/quiz/accessrule/proview

      - name: PHP Doc checker
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache lint
        run: moodle-plugin-ci mustache

      - name: Grunt
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit
        run: moodle-plugin-ci phpunit --coverage-text

      - name: Behat
        run: moodle-plugin-ci behat --profile chrome

      - name: Upload Behat fail dump
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-faildump-${{ matrix.moodle-branch }}-php${{ matrix.php }}-${{ matrix.database }}
          path: ${{ github.workspace }}/moodledata/behat_dump
          retention-days: 7

  build:
    name: Build plugin ZIP
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '[0-9]{10}' version.php | head -1)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "name=quizaccess_proview-${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Prepare plugin directory
        run: |
          mkdir -p /tmp/build/quizaccess_proview
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='.husky' \
                   --exclude='.zed' \
                   --exclude='node_modules' \
                   --exclude='vendor' \
                   --exclude='CLAUDE.md' \
                   --exclude='.gitignore' \
                   --exclude='.phpcs.xml' \
                   --exclude='composer.json' \
                   --exclude='composer.lock' \
                   --exclude='package.json' \
                   --exclude='package-lock.json' \
                   --exclude='phpmd.xml' \
                   --exclude='phpstan.neon' \
                   --exclude='phpunit.xml' \
                   --exclude='tests' \
                   ./ /tmp/build/quizaccess_proview/

      - name: Upload plugin artifact
        # GitHub zips this directory on download — structure will be:
        #   quizaccess_proview/version.php  <-- directly installable via Moodle admin UI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}
          path: /tmp/build/
          retention-days: 30
